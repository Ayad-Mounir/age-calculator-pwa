<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة العمر الدقيقة</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4A90D9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="حاسبة العمر">
    <link rel="apple-touch-icon" href="icon.svg">
</head>
<body>
    <div class="container">
        <h1>🎂 حاسبة العمر الدقيقة</h1>
        <p>أدخل تاريخ ميلادك لحساب عمرك بالتفصيل</p>
        <input type="datetime-local" id="birthdate">
        <button onclick="calculateAge()" class="btn-primary">احسب العمر</button>
        <div id="result" class="result"></div>
        
        <!-- زر تثبيت التطبيق -->
        <div id="install-container" class="install-container" style="display:none;">
            <button id="install-btn" class="btn-install">
                📲 تثبيت التطبيق
            </button>
            <p class="install-hint">ثبّت التطبيق على جهازك لاستخدامه دون إنترنت</p>
        </div>
    </div>
    
    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
